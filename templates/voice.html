<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KrishiRakshak AI - Voice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body data-page="voice">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <header class="site-header glass">
    <a class="logo" href="{{ url_for('main.home') }}">KrishiRakshak AI</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">Menu</button>
    <nav class="site-nav" id="siteNav">
      <a href="{{ url_for('main.home') }}">Home</a>
      <a href="{{ url_for('main.detect_page') }}">Detect</a>
      <a href="{{ url_for('main.chat_page') }}">Chat</a>
      <a href="{{ url_for('main.weather_page') }}">Weather</a>
      <a href="{{ url_for('main.voice_page') }}" class="active">Voice</a>
    </nav>
  </header>

  <main class="page page-narrow">
    <section class="panel glass tilt-card">
      <h1>Voice Assistant</h1>
      <p class="subtext">Speak your farming question and get AI response.</p>
      <button class="btn btn-primary" id="voiceStartBtn">Start Voice</button>
      <div class="result-card glass" style="margin-top:12px;">
        <h3>Transcript</h3>
        <p id="voiceTranscript">No input yet.</p>
      </div>
      <div class="spinner-wrap hidden" id="voiceLoading">
        <div class="spinner"></div>
        <p>Processing voice query...</p>
      </div>
      <div id="voiceError" class="alert hidden"></div>
      <div class="result-card glass" style="margin-top:12px;">
        <h3>Assistant Response</h3>
        <p id="voiceAnswer">Response will appear here.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer glass">
    <p>© 2026 KrishiRakshak AI</p>
    <div class="footer-links">
      <a href="{{ url_for('main.detect_page') }}">Detect</a>
      <a href="{{ url_for('main.weather_page') }}">Weather</a>
    </div>
  </footer>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
